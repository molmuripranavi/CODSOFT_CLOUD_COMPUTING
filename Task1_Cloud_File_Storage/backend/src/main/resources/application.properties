spring.datasource.url=${SPRING_DATASOURCE_URL:${MYSQL_URL:jdbc:h2:mem:cloudfile;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:${MYSQLUSER:sa}}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:${MYSQLPASSWORD:}}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER_CLASS_NAME:org.h2.Driver}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=${SPRING_JPA_DIALECT:org.hibernate.dialect.H2Dialect}

spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=100MB